<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Uruguay: Ve series online, ve películas online</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__overlay">
        <div class="container">
          <section class="header__bar">
            <div class="header__logo">
              <img src="./imgs/logo.svg" alt="" />
            </div>
            <ul class="header__nav">
              <li>
                <select name="" id="">
                  <option value="">Español</option>
                  <option value="">English</option>
                </select>
              </li>
              <li>
                <button class="btn">Iniciar sesión</button>
              </li>
            </ul>
          </section>

          <section class="header__info">
            <h1 class="header__title">
              Películas y series ilimitadas y mucho más
            </h1>
            <p class="header__price">
              A partir de US$ 11,99. Cancela cuando quieras.
            </p>
            <p>
              ¿Quieres ver Netflix ya? Ingresa tu email para crear una cuenta o
              reiniciar tu membresía de Netflix.
            </p>
            <form class="header__form">
              <input type="email" placeholder="Email" />
              <button class="btn">Comenzar ></button>
            </form>
          </section>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="trend margin-top">
        <h2>Tendencias</h2>

        <div class="trend__container">
          <article class="trend__article">
            <img
              class="trend__img"
              src="/imgs/1-en-el-barro.webp"
              alt="En el barro banner"
            /><span class="trend__num">1</span>
          </article>
          <!--.Article-->
          <article class="trend__article">
            <img
              class="trend__img"
              src="/imgs/2-peaky-blinders-the-inmortal-man.webp"
              alt="Peaky blinders el hombre inmortal banner"
            /><span class="trend__num">2</span>
          </article>
          <!--.Article-->
          <article class="trend__article">
            <img
              class="trend__img"
              src="/imgs/3-máquina-de-guerra.webp"
              alt="Máquina de guerra banner"
            /><span class="trend__num">3</span>
          </article>
          <!--.Article-->
          <article class="trend__article">
            <img
              class="trend__img"
              src="/imgs/4-bridgerton.webp"
              alt="Bridgerton banner"
            /><span class="trend__num">4</span>
          </article>
          <!--.Article-->
          <article class="trend__article">
            <img
              class="trend__img"
              src="/imgs/5-la-reina-del-flow.webp"
              alt="La reina del flow banner"
            /><span class="trend__num">5</span>
          </article>
          <!--.Article-->
          <article class="trend__article">
            <img
              class="trend__img"
              src="/imgs/6-one-piece.webp"
              alt="One Piece banner"
            /><span class="trend__num">6</span>
          </article>
          <!--.Article-->
          <article class="trend__article">
            <img
              class="trend__img"
              src="/imgs/7-BTS.webp"
              alt="BTS banner"
            /><span class="trend__num">7</span>
          </article>
          <!--.Article-->
          <article class="trend__article">
            <img
              class="trend__img"
              src="/imgs/8-esa-noche.webp"
              alt="Esa noche banner"
            /><span class="trend__num">8</span>
          </article>
          <!--.Article-->
          <article class="trend__article">
            <img
              class="trend__img"
              src="/imgs/9-jojo.webp"
              alt="jojo banner"
            /><span class="trend__num">9</span>
          </article>
          <!--.Article-->
          <article class="trend__article">
            <img
              class="trend__img"
              src="/imgs/10-envidiosa.webp"
              alt="Envidiosa banner"
            /><span class="trend__num">10</span>
          </article>
          <!--.Article-->

          <button class="trend__arrow trend__arrow--right">></button>
          <button class="trend__arrow trend__arrow--left"><</button>
        </div>
      </section>
    </main>
  </body>
</html>
